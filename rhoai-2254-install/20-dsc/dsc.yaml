---
# Pre-migration DataScienceCluster.
# Every component is Managed so the migration has something to operate on.
# KServe is in Serverless mode (the "difficult" path) — migration §2.8 will convert
# InferenceServices to RawDeployment and set kserve.serving.managementState=Removed.
# ModelMesh is Managed — migration §2.8.9 sets it to Removed.
# Kueue is Managed with the embedded distribution — migration §2.2 sets it to Removed.
apiVersion: datasciencecluster.opendatahub.io/v1
kind: DataScienceCluster
metadata:
  name: default-dsc
  labels:
    app.kubernetes.io/name: datasciencecluster
spec:
  components:
    codeflare:
      managementState: Managed
    dashboard:
      managementState: Managed
    datasciencepipelines:
      managementState: Managed
    kserve:
      managementState: Managed
      defaultDeploymentMode: Serverless
      serving:
        managementState: Managed
        name: knative-serving
        ingressGateway:
          certificate:
            type: OpenshiftDefaultIngress
      nim:
        managementState: Managed
    kueue:
      managementState: Managed
    modelmeshserving:
      managementState: Managed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    ray:
      managementState: Managed
    trainingoperator:
      managementState: Managed
    trustyai:
      managementState: Managed
    workbenches:
      managementState: Managed
    feastoperator:
      managementState: Managed
    llamastackoperator:
      managementState: Managed
