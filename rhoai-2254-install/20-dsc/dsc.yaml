---
# Pre-migration DataScienceCluster. Rendered through envsubst so the fields the
# migration toggles between 2.x and 3.x states can be overridden by the assessment
# wrapper. Defaults reproduce the full "pre-migration" state used by install.sh.
#
# Overridable env vars (all optional; defaults shown):
#   DSC_KSERVE_MANAGEMENT_STATE=Managed
#   DSC_KSERVE_DEFAULT_MODE=Serverless
#   DSC_KSERVE_SERVING_STATE=Managed
#   DSC_MODELMESH_STATE=Managed
#   DSC_KUEUE_STATE=Managed
#   DSC_WORKBENCHES_STATE=Managed
#   DSC_RAY_STATE=Managed
#   DSC_CODEFLARE_STATE=Managed
#   DSC_TRAININGOPERATOR_STATE=Managed
#   DSC_TRUSTYAI_STATE=Managed
#   DSC_DATASCIENCEPIPELINES_STATE=Managed
#   DSC_MODELREGISTRY_STATE=Managed
#   DSC_FEASTOPERATOR_STATE=Managed
#   DSC_LLAMASTACK_STATE=Managed
apiVersion: datasciencecluster.opendatahub.io/v1
kind: DataScienceCluster
metadata:
  name: default-dsc
  labels:
    app.kubernetes.io/name: datasciencecluster
spec:
  components:
    codeflare:
      managementState: ${DSC_CODEFLARE_STATE}
    dashboard:
      managementState: Managed
    datasciencepipelines:
      managementState: ${DSC_DATASCIENCEPIPELINES_STATE}
    kserve:
      managementState: ${DSC_KSERVE_MANAGEMENT_STATE}
      defaultDeploymentMode: ${DSC_KSERVE_DEFAULT_MODE}
      serving:
        managementState: ${DSC_KSERVE_SERVING_STATE}
        name: knative-serving
        ingressGateway:
          certificate:
            type: OpenshiftDefaultIngress
      nim:
        managementState: Managed
    kueue:
      managementState: ${DSC_KUEUE_STATE}
    modelmeshserving:
      managementState: ${DSC_MODELMESH_STATE}
    modelregistry:
      managementState: ${DSC_MODELREGISTRY_STATE}
      registriesNamespace: rhoai-model-registries
    ray:
      managementState: ${DSC_RAY_STATE}
    trainingoperator:
      managementState: ${DSC_TRAININGOPERATOR_STATE}
    trustyai:
      managementState: ${DSC_TRUSTYAI_STATE}
    workbenches:
      managementState: ${DSC_WORKBENCHES_STATE}
    feastoperator:
      managementState: ${DSC_FEASTOPERATOR_STATE}
    llamastackoperator:
      managementState: ${DSC_LLAMASTACK_STATE}
