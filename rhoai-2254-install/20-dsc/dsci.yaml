---
# Pre-migration DSCInitialization. Rendered via envsubst.
# Overridable env var:
#   DSCI_SERVICEMESH_STATE=Managed  (default; migration §2.8.9 sets this to Removed)
apiVersion: dscinitialization.opendatahub.io/v1
kind: DSCInitialization
metadata:
  name: default-dsci
spec:
  applicationsNamespace: redhat-ods-applications
  monitoring:
    managementState: Managed
    namespace: redhat-ods-monitoring
    metrics: {}
  serviceMesh:
    managementState: ${DSCI_SERVICEMESH_STATE}
    controlPlane:
      name: data-science-smcp
      namespace: istio-system
      metricsCollection: Istio
  trustedCABundle:
    managementState: Managed
    customCABundle: ""
