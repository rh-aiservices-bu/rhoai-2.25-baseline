---
apiVersion: v1
kind: Namespace
metadata:
  name: pytorch-training
  labels:
    opendatahub.io/dashboard: "true"
---
# Distributed PyTorch training job — migration §2.9 just captures the list of these pre-upgrade.
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: pytorch-distributed-training
  namespace: pytorch-training
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          containers:
            - name: pytorch
              image: pytorch/pytorch:2.4.0-cuda12.1-cudnn9-runtime
              command:
                - /bin/sh
                - -c
                - |
                  python -c "import time; t = 0
                  while t < 36000:
                      print(f'master: step {t}')
                      time.sleep(10); t += 10"
              resources:
                requests:
                  cpu: "500m"
                  memory: 1Gi
                limits:
                  cpu: "1"
                  memory: 2Gi
    Worker:
      replicas: 2
      restartPolicy: OnFailure
      template:
        spec:
          containers:
            - name: pytorch
              image: pytorch/pytorch:2.4.0-cuda12.1-cudnn9-runtime
              command:
                - /bin/sh
                - -c
                - |
                  python -c "import time; t = 0
                  while t < 36000:
                      print(f'worker: step {t}')
                      time.sleep(10); t += 10"
              resources:
                requests:
                  cpu: "500m"
                  memory: 1Gi
                limits:
                  cpu: "1"
                  memory: 2Gi
