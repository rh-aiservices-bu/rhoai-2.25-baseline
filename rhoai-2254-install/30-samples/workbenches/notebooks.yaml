---
apiVersion: v1
kind: Namespace
metadata:
  name: workbenches-regular
  labels:
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "false"
---
apiVersion: v1
kind: Namespace
metadata:
  name: workbenches-hwp
  labels:
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "false"
---
# Jupyter workbench, 2025.1 image (older — migration §2.6 recommends upgrading to 2025.2 first)
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  name: jupyter-2025-1
  namespace: workbenches-regular
  labels:
    app: jupyter-2025-1
    opendatahub.io/dashboard: "true"
  annotations:
    opendatahub.io/image-display-name: "Jupyter | Standard Data Science | CPU | 2025.1"
    notebooks.opendatahub.io/inject-oauth: "true"
    notebooks.kubeflow.org/last-activity: ""
    kubeflow-resource-stopped: "true"
spec:
  template:
    spec:
      serviceAccountName: jupyter-2025-1
      containers:
        - name: jupyter-2025-1
          image: image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/jupyter-datascience-notebook:2025.1
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                --ServerApp.token=''
                --ServerApp.password=''
                --ServerApp.base_url=/notebook/workbenches-regular/jupyter-2025-1
          volumeMounts:
            - name: jupyter-2025-1
              mountPath: /opt/app-root/src
      volumes:
        - name: jupyter-2025-1
          persistentVolumeClaim:
            claimName: jupyter-2025-1
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jupyter-2025-1
  namespace: workbenches-regular
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jupyter-2025-1
  namespace: workbenches-regular
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
