---
apiVersion: v1
kind: Namespace
metadata:
  name: ml-project-a
  labels:
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "false"
---
apiVersion: v1
kind: Namespace
metadata:
  name: ml-project-b
  labels:
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "false"
---
# Serverless InferenceService — migration §2.8.7.1 converts this to RawDeployment.
# The annotation pins the deployment mode to Serverless even though the DSC default is also Serverless.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: my-serverless-isvc
  namespace: ml-project-a
  annotations:
    serving.kserve.io/deploymentMode: "Serverless"
  labels:
    opendatahub.io/dashboard: "true"
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    sklearn:
      storageUri: gs://kfserving-examples/models/sklearn/1.0/model
      resources:
        requests:
          cpu: "100m"
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: another-sl-model
  namespace: ml-project-b
  annotations:
    serving.kserve.io/deploymentMode: "Serverless"
  labels:
    opendatahub.io/dashboard: "true"
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    sklearn:
      storageUri: gs://kfserving-examples/models/sklearn/1.0/model
      resources:
        requests:
          cpu: "100m"
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
