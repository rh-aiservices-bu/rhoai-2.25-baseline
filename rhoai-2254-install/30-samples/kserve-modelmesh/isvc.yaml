---
apiVersion: v1
kind: Namespace
metadata:
  name: ml-project-c
  labels:
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "true"
---
# Multi-model ServingRuntime — the spec.multiModel: true marker is what §2.8.7.2 keys off.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: mlserver-1.x
  namespace: ml-project-c
  labels:
    opendatahub.io/dashboard: "true"
  annotations:
    openshift.io/display-name: "MLServer 1.x multi-model"
    enable-route: "true"
spec:
  supportedModelFormats:
    - name: sklearn
      version: "0"
      autoSelect: true
    - name: xgboost
      version: "1"
      autoSelect: true
    - name: lightgbm
      version: "3"
      autoSelect: true
  multiModel: true
  protocolVersions:
    - grpc-v2
  grpcEndpoint: port:8085
  grpcDataEndpoint: port:8001
  containers:
    - name: mlserver
      image: seldonio/mlserver:1.3.2
      env:
        - name: MLSERVER_MODELS_DIR
          value: /models/_mlserver_models/
        - name: MLSERVER_GRPC_PORT
          value: "8001"
        - name: MLSERVER_HTTP_PORT
          value: "8002"
        - name: MLSERVER_LOAD_MODELS_AT_STARTUP
          value: "false"
        - name: MLSERVER_MODEL_NAME
          value: dummy-model
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: "5"
          memory: 1Gi
  builtInAdapter:
    serverType: mlserver
    runtimeManagementPort: 8001
    memBufferBytes: 134217728
    modelLoadingTimeoutMillis: 90000
---
# ModelMesh InferenceService — migration §2.8.7.2 converts this to RawDeployment
# with an equivalent single-model ServingRuntime.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: my-modelmesh-isvc
  namespace: ml-project-c
  annotations:
    serving.kserve.io/deploymentMode: "ModelMesh"
  labels:
    opendatahub.io/dashboard: "true"
spec:
  predictor:
    model:
      modelFormat:
        name: sklearn
      runtime: mlserver-1.x
      storage:
        key: aws-connection-my-storage
        path: sklearn/mnist-svm.joblib
