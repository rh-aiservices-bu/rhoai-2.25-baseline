---
apiVersion: v1
kind: Namespace
metadata:
  name: test-trustyaiservice
  labels:
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "false"
---
# TrustyAI with PVC storage — migration §2.5.3 backs up /inputs from this PVC.
apiVersion: trustyai.opendatahub.io/v1alpha1
kind: TrustyAIService
metadata:
  name: trustyai-service
  namespace: test-trustyaiservice
spec:
  storage:
    format: PVC
    folder: /inputs
    size: 1Gi
  data:
    filename: data.csv
    format: CSV
  metrics:
    schedule: 5s
