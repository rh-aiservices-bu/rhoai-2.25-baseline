---
apiVersion: v1
kind: Namespace
metadata:
  name: dspa-sample
  labels:
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "false"
---
# DataSciencePipelinesApplication using the v1 API (stable in 2.25.4).
# Migration §2.4 runs check_before_upgrade.sh to detect deprecated v1alpha1 usage and
# flags the deprecated 'instructLab' field.
apiVersion: datasciencepipelinesapplications.opendatahub.io/v1
kind: DataSciencePipelinesApplication
metadata:
  name: sample-pipelines
  namespace: dspa-sample
spec:
  dspVersion: v2
  apiServer:
    enableSamplePipeline: true
  database:
    disableHealthCheck: false
    mariaDB:
      deploy: true
      pipelineDBName: mlpipeline
      pvcSize: 10Gi
      username: mlpipeline
  objectStorage:
    disableHealthCheck: false
    minio:
      deploy: true
      image: quay.io/minio/minio:RELEASE.2024-09-13T20-26-02Z
      pvcSize: 10Gi
      bucket: mlpipeline
